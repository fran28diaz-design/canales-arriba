{% extends "base.html" %}

{% block title %}Recuperar contraseña{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>¿Olvidaste tu contraseña?</h1>
        <p class="subtitle">Ingresa tu email para recibir el enlace de recuperación</p>
        <form method="POST">
            <div class="form-group">
                <label>Email:</label>
                <input type="email" name="email" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Enviar enlace</button>
        </form>
        <p class="auth-footer"><a href="{{ url_for('login') }}">Volver al inicio de sesión</a></p>
    </div>
</div>
{% endblock %}
