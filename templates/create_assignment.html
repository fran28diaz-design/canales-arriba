{% extends "base.html" %}

{% block title %}{% if edit_mode %}Editar Tarea{% else %}Crear Nueva Tarea{% endif %} - English Academy{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <div class="form-header">
            <h1>{% if edit_mode %}✏️ Editar Tarea{% else %}📝 Crear Nueva Tarea{% endif %}</h1>
        </div>
        
        <form method="POST" class="form form-large">
            <div class="form-group">
                <label for="target_student_id">Asignar a estudiante:</label>
                <select id="target_student_id" name="target_student_id">
                    <option value="">Todos los estudiantes</option>
                    {% for student in students %}
                        <option value="{{ student.id }}"
                            {% if assignment and assignment.target_student_id == student.id %}selected{% endif %}>
                            {{ student.nombre }} (@{{ student.username }})
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="titulo">Título de la Tarea:</label>
                <input type="text" id="titulo" name="titulo" 
                       value="{% if assignment %}{{ assignment.titulo }}{% endif %}" 
                       placeholder="Ej: Ensayo sobre Shakespeare" required>
            </div>
            
            <div class="form-group">
                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" name="descripcion" rows="6" 
                          placeholder="Explica con detalle qué debe hacer el estudiante..." required>{% if assignment %}{{ assignment.descripcion }}{% endif %}</textarea>
            </div>
            
            <div class="form-group">
                <label for="fecha_entrega">Fecha y Hora de Entrega:</label>
                <input type="datetime-local" id="fecha_entrega" name="fecha_entrega" 
                       value="{% if assignment %}{{ assignment.fecha_entrega.strftime('%Y-%m-%dT%H:%M') }}{% endif %}"
                       required>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    {% if edit_mode %}Actualizar Tarea{% else %}Crear Tarea{% endif %}
                </button>
                <a href="{{ url_for('dashboard_teacher') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
